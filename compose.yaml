# PostgreSQL for UniLink.
#
# Local dev:   docker compose up -d db      (defaults below "just work")
# Production:  set strong values in a root .env, then the same command on the VPS.
#
# Data lives in the named volume `db-data`, so restarting/upgrading the
# container never loses your database.

name: unilink

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-unilink}
    ports:
      # Host port is overridable; container always listens on 5432.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-unilink}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
